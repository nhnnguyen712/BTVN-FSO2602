<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Navigation</title>

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="menu">
        <!-- Framework -->
        <div class="dropdown">
          <span>Framework</span>
          <div class="dropdown-menu">
            <div class="col">
              <h4>Framework</h4>
              <p>React</p>
              <p>Vue</p>
              <p>Angular</p>
            </div>
          </div>
        </div>

        <!-- Demos -->
        <div class="dropdown">
          <span>Demos</span>
          <div class="dropdown-menu">
            <div class="col">
              <h4>Demos</h4>
              <p>Dashboard</p>
              <p>Charts</p>
              <p>UI Kit</p>
            </div>
          </div>
        </div>

        <!-- Resources -->
        <div class="dropdown">
          <span>Resources</span>

          <div class="dropdown-menu big">
            <div class="col">
              <h4>Top Controls</h4>
              <p>Grid</p>
              <p>Chart</p>
              <p>Controls</p>
              <p>Financial Chart</p>
            </div>

            <div class="col">
              <h4>Top Controls</h4>
              <p>API</p>
              <p>Blogs</p>
              <p>Knowledge Base</p>
              <p>Videos</p>
              <p>Forums</p>
              <p>Licensing</p>
            </div>
          </div>
        </div>

        <!-- Documentation -->
        <div class="dropdown">
          <span>Documentation</span>
          <div class="dropdown-menu">
            <div class="col">
              <h4>Docs</h4>
              <p>Getting Started</p>
              <p>API Docs</p>
              <p>Guides</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right -->
      <div class="auth">
        <span>Log in</span>
        <button>Sign up</button>
      </div>
    </nav>
  </body>
</html>
