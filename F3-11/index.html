<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LienMinhHHuyenThoai</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="reset.css" />
  </head>
  <body>
    <section class="banner">
      <img src="./assets/images/banner.png" alt="Banner" />
    </section>

    <header class="navbar">
      <div class="logo">
        <img src="./assets/images/logo.png" alt="Logo" />
      </div>

      <nav>
        <ul>
          <li>Game</li>
          <li>Champions</li>
          <li>News</li>
          <li>Patch Notes</li>
          <li>Discover</li>
          <li>Esports</li>
          <li>Universe</li>
        </ul>
      </nav>
    </header>

    <section class="champions">
      <div class="grid">
        <div class="card">
          <img src="./assets/images/ahri.png" alt="Ahri" />
          <div class="name">AHRI</div>
        </div>

        <div class="card">
          <img src="./assets/images/akali.png" alt="Akali" />
          <div class="name">AKALI</div>
        </div>

        <div class="card">
          <img src="./assets/images/azir.png" alt="Azir" />
          <div class="name">AZIR</div>
        </div>

        <div class="card">
          <img src="./assets/images/caitlyn.png" alt="Caitlyn" />
          <div class="name">CAITLYN</div>
        </div>

        <div class="card">
          <img src="./assets/images/darius.png" alt="Darius" />
          <div class="name">DARIUS</div>
        </div>

        <div class="card">
          <img src="./assets/images/fizz.png" alt="Fizz" />
          <div class="name">FIZZ</div>
        </div>

        <div class="card">
          <img src="./assets/images/irelia.png" alt="Irelia" />
          <div class="name">IRELIA</div>
        </div>

        <div class="card">
          <img src="./assets/images/jinx.png" alt="Jinx" />
          <div class="name">JINX</div>
        </div>

        <div class="card">
          <img src="./assets/images/rengar.png" alt="Rengar" />
          <div class="name">RENGAR</div>
        </div>

        <div class="card">
          <img src="./assets/images/seraphine.png" alt="Seraphine" />
          <div class="name">SERAPHINE</div>
        </div>

        <div class="card">
          <img src="./assets/images/yasuo.png" alt="Yasuo" />
          <div class="name">YASUO</div>
        </div>

        <div class="card">
          <img src="./assets/images/wukong.png" alt="Wukong" />
          <div class="name">WUKONG</div>
        </div>
      </div>
    </section>

    <section class="video-section">
      <div class="video-container">
        <iframe
          src="https://www.youtube.com/embed/O4PDzBnBMU4"
          title="YouTube video"
          frameborder="0"
          allowfullscreen
        >
        </iframe>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-left">© 2021 All Rights Reserved</div>
      <div class="footer-right">
        <input type="text" placeholder="Email Address" />
        <button>Play For Free</button>
      </div>
    </footer>
  </body>
</html>
