<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Info UI Design</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="product">
      <div class="product-img">
        <img
          src="https://songlongmedia.com/media/product/2236_tai_nghe_razer_kraken_kitty_chroma_quartz_songlongmedia_1.jpg"
          alt="Razer Kraken Kitty Edt Gaming Headset Quartz"
        />
      </div>

      <div class="product-details">
        <p class="badge">Free shipping</p>

        <h2>Razer Kraken Kitty Edt Gaming Headset Quartz</h2>

        <div class="price-group">
          <p class="old-price">1,599,000</p>
          <p class="price">799,000</p>
          <p class="subtitle">
            The offer is valid until April 3 or as long as stock lasts!
          </p>
        </div>

        <button class="btn-primary">Add to Cart</button>

        <div class="stock-status">
          <div class="dot"></div>
          50+ pcs. in stock.
        </div>

        <div class="btn-group">
          <button class="btn-secondary">
            <i class="fa-solid fa-scale-balanced"></i>
            Add to Cart
          </button>
          <button class="btn-secondary">
            <i class="fa-regular fa-heart"></i>
            Add to Wishlist
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
